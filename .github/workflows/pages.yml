# GitBook Pages — Build & Deploy to GitHub Pages
#
# Triggered automatically when doc-converter pushes updated content
# to this repo. Builds the HonKit static site and deploys to Pages.

name: Deploy GitBook

on:
  push:
    branches: [main]
    paths:
      - content/**
      - SUMMARY.md
      - book.json
      - assets/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install HonKit
        run: npm ci

      - name: Build static site
        run: npx honkit build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
